spring.application.name=ajax
server.port=8080

# ===================================================================
#  CONFIGURACIÓN PARA PRODUCCIÓN (RENDER + AIVEN)
# ===================================================================
# Estas variables se deben configurar en el entorno de Render.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}

# Se recomienda 'validate' o 'none' en producción después del primer despliegue.
# Usar 'update' para que Render cree las tablas la primera vez.
spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:update} 
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===================================================================
#  CONFIGURACIÓN LOCAL (COMENTADA)
# ===================================================================
#spring.datasource.url=jdbc:mysql://localhost:3306/db_ajax?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
#spring.datasource.username=root
#spring.datasource.password=
