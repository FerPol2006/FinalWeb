<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiReSe - Registro de Aspirantes</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f6f9; }
        .register-box { width: 400px; margin: 7% auto; }
    </style>
</head>
<body>

<div class="register-box">
    <div class="card card-outline card-primary shadow">
        <div class="card-header text-center bg-primary text-white">
            <h3><b>SiReSe</b> Registro</h3>
        </div>
        <div class="card-body">
            <p class="login-box-msg text-center mb-3">Registra tus datos como aspirante</p>

            <form id="formRegistroAspirante">
                <div class="input-group mb-3">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" class="form-control" id="nombre" placeholder="Nombre Completo" required>
                </div>

                <div class="input-group mb-3">
                    <span class="input-group-text"><i class="fas fa-phone"></i></span>
                    <input type="tel" class="form-control" id="telefono" placeholder="Teléfono" pattern="[0-9]{10}" title="Debe contener 10 dígitos numéricos" required>
                </div>

                <div class="input-group mb-3">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="email" class="form-control" id="email" placeholder="Correo Electrónico" required>
                </div>

                <div class="input-group mb-3">
                    <span class="input-group-text"><i class="fas fa-graduation-cap"></i></span>
                    <select class="form-select" id="carrera" required>
                        <option value="" disabled selected>Selecciona una carrera...</option>
                        <option value="1">Ingeniería en Sistemas</option>
                        <option value="2">Administración de Empresas</option>
                        <option value="3">Derecho</option>
                    </select>
                </div>

                <div class="row mt-4">
                    <div class="col-6">
                        <button type="button" class="btn btn-secondary w-100">Más información</button>
                    </div>
                    <div class="col-6">
                        <button type="submit" class="btn btn-primary w-100">Enviar</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/app-ajax.js"></script>
</body>
</html>
