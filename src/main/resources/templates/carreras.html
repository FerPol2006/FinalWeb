<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SiReSe - Carreras</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- DataTables CSS -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.bootstrap5.min.css">
    <style>
        body { overflow-x: hidden; background-color: #f4f6f9;}
        .sidebar { min-height: 100vh; background-color: #343a40; color: white; padding-top: 20px;}
        .sidebar a { color: #c2c7d0; text-decoration: none; display: block; padding: 10px 20px;}
        .sidebar a:hover, .sidebar a.active { background-color: #495057; color: white;}
    </style>
</head>
<body>

<div class="row g-0">
    <!-- Sidebar -->
    <div class="col-md-2 sidebar shadow">
        <h4 class="text-center mb-4"><i class="fas fa-university"></i> SiReSe</h4>
        <nav>
            <a href="admin.html"><i class="fas fa-home me-2"></i> Inicio</a>
            <a href="aspirantes.html"><i class="fas fa-users me-2"></i> Listado (Aspirantes)</a>
            <a href="constancias.html"><i class="fas fa-file-pdf me-2"></i> Constancias</a>
            <a href="carreras.html" class="active"><i class="fas fa-book me-2"></i> Carreras</a>
            <a href="login.html" class="text-danger mt-5"><i class="fas fa-sign-out-alt me-2"></i> Salir</a>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="col-md-10 p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Gestión de Carreras</h2>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalCarrera">
                <i class="fas fa-plus"></i> Nueva Carrera
            </button>
        </div>

        <div class="card shadow">
            <div class="card-body">
                <div class="table-responsive">
                    <table id="tablaCarreras" class="table table-striped table-bordered w-100">
                        <thead class="table-dark">
                            <tr>
                                <th>Nombre</th>
                                <th>Semestres</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>Ingeniería en Sistemas</td>
                                <td>9</td>
                                <td>
                                    <button class="btn btn-sm btn-warning"><i class="fas fa-edit"></i></button>
                                    <button class="btn btn-sm btn-danger btn-eliminar-carrera"><i class="fas fa-trash"></i></button>
                                </td>
                            </tr>
                            <tr>
                                <td>Administración de Empresas</td>
                                <td>8</td>
                                <td>
                                    <button class="btn btn-sm btn-warning"><i class="fas fa-edit"></i></button>
                                    <button class="btn btn-sm btn-danger btn-eliminar-carrera"><i class="fas fa-trash"></i></button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal Agregar/Editar Carrera -->
<div class="modal fade" id="modalCarrera" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">Carrera</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="formCarrera">
                    <div class="mb-3">
                        <label class="form-label">Nombre de la Carrera</label>
                        <input type="text" class="form-control" id="nombreCarrera" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Semestres</label>
                        <input type="number" class="form-control" id="semestresCarrera" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Observaciones</label>
                        <textarea class="form-control" id="observacionesCarrera" rows="3"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-primary" id="btnGuardarCarrera">Guardar</button>
            </div>
        </div>
    </div>
</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- DataTables -->
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
<!-- DataTables Buttons -->
<script src="https://cdn.datatables.net/buttons/2.4.1/js/dataTables.buttons.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.bootstrap5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.html5.min.js"></script>

<script src="/app-ajax.js"></script>
</body>
</html>
