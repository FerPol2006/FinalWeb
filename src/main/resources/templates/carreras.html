            <div class="container-xxl flex-grow-1 container-p-y">

              <div class="d-flex justify-content-between align-items-center mb-4">
                  <h4 class="fw-bold py-3 mb-0">Gestión de Carreras</h4>
                  <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalCarrera">
                      <i class="bx bx-plus me-1"></i> Nueva Carrera
                  </button>
              </div>

              <!-- Basic Bootstrap Table -->
              <div class="card">
                <div class="card-body">
                  <div class="table-responsive text-nowrap">
                    <table id="tablaCarreras" class="table table-hover">
                      <thead>
                        <tr>
                          <th>Nombre</th>
                          <th>Semestres</th>
                          <th>Acciones</th>
                        </tr>
                      </thead>
                      <tbody class="table-border-bottom-0">
                        <tr>
                          <td><strong>Ingeniería en Sistemas</strong></td>
                          <td>9</td>
                          <td>
                            <button class="btn btn-icon btn-sm btn-outline-warning" title="Editar"><i class="bx bx-edit-alt"></i></button>
                            <button class="btn btn-icon btn-sm btn-outline-danger btn-eliminar-carrera" title="Eliminar"><i class="bx bx-trash"></i></button>
                          </td>
                        </tr>
                        <tr>
                          <td><strong>Administración de Empresas</strong></td>
                          <td>8</td>
                          <td>
                            <button class="btn btn-icon btn-sm btn-outline-warning" title="Editar"><i class="bx bx-edit-alt"></i></button>

    <!-- Modal Agregar/Editar Carrera -->
    <div class="modal fade" id="modalCarrera" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Carrera</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formCarrera">
                        <div class="mb-3">
                            <label class="form-label">Nombre de la Carrera</label>
                            <input type="text" class="form-control" id="nombreCarrera" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Semestres</label>
                            <input type="number" class="form-control" id="semestresCarrera" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Observaciones</label>
                            <textarea class="form-control" id="observacionesCarrera" rows="3"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="btnGuardarCarrera">Guardar</button>
                </div>
            </div>
        </div>
